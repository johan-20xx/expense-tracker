{% extends 'base.html' %}
{% block title %}Edit Expense — ExpenseIQ{% endblock %}
{% block body %}
<nav>
  <a class="nav-logo" href="/dashboard">💸 ExpenseIQ</a>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a><a href="/income">Income</a>
    <a href="/budget">Budget</a><a href="/goals">Goals</a><a href="/profile">Profile</a>
  </div>
  <div class="nav-right"><a href="/logout" class="btn btn-ghost btn-sm">Logout</a></div>
</nav>
<div class="main" style="max-width:600px;">
  <a href="/dashboard" style="color:var(--muted);text-decoration:none;font-size:13px;">← Back</a>
  <div class="page-title" style="margin-top:12px;">Edit Expense</div>
  <div class="page-sub">Update expense details</div>
  <div class="card fade-up">
    <form method="POST">
      <div class="grid-2">
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" value="{{ expense[2] }}" required>
        </div>
        <div class="form-group">
          <label>Amount ({{ settings.currency }})</label>
          <input type="number" step="0.01" name="amount" value="{{ expense[3] }}" required>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Category</label>
          <select name="category" id="categorySelect" onchange="toggleCustom()">
            {% for cat in ['Food','Transport','Shopping','Education','Entertainment','Health','Bills'] %}
            <option value="{{ cat }}" {% if expense[4] == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
            <option value="Other" {% if expense[4] not in ['Food','Transport','Shopping','Education','Entertainment','Health','Bills'] %}selected{% endif %}>✏️ Other</option>
          </select>
        </div>
        <div class="form-group" id="customCatGroup">
          <label>Custom Category</label>
          <input type="text" name="custom_category" value="{{ expense[4] }}" placeholder="Custom name...">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="date" value="{{ expense[5] }}" required>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location" value="{{ expense[7] or '' }}">
        </div>
        <div class="form-group">
          <label>Who Paid</label>
          <input type="text" name="who_paid" value="{{ expense[8] or '' }}">
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea name="notes">{{ expense[6] or '' }}</textarea>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" name="is_recurring" id="recurring" {% if expense[9] %}checked{% endif %}>
        <label for="recurring" style="text-transform:none;font-size:14px;font-weight:500;color:var(--text);">🔄 Recurring expense</label>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:13px;font-size:15px;">Update Expense →</button>
    </form>
  </div>
</div>
<script>
function toggleCustom() {
  const sel = document.getElementById('categorySelect').value;
  document.getElementById('customCatGroup').style.display = sel === 'Other' ? 'block' : 'none';
}
toggleCustom();
</script>
{% endblock %}
